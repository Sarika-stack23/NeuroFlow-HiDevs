worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json text/css application/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=10r/h;

    # API upstream — load balance across two replicas
    upstream api_backend {
        server api:8000;
        server api:8000;  # docker compose replicas resolve via DNS round-robin
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        location /ingest {
            limit_req zone=ingest burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            client_max_body_size 110m;
        }

        # Frontend
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
        }
    }
}
