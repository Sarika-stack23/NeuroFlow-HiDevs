name: CI

on:
  push:
    branches: [main, "task-*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check backend/
      - run: mypy backend/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: neuroflow_test
          POSTGRES_USER: neuroflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      POSTGRES_URL: postgresql://neuroflow:testpassword@localhost:5432/neuroflow_test
      REDIS_URL: redis://localhost:6379/0
      REDIS_PASSWORD: ""
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_SECRET_KEY: testsecret1234567890abcdef1234567890ab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: pytest tests/unit/ -v --cov=backend --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install detect-secrets pip-audit
      - run: detect-secrets scan --baseline .secrets.baseline || true
      - run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2022-42974 || true
